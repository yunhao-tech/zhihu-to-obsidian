<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Popup Demo — 知乎 → Obsidian</title>
  <link rel="stylesheet" href="popup.css">
  <style>
    html { background: #000; display: flex; justify-content: center; padding: 40px; }
    body { width: 360px; border-radius: 12px; overflow: hidden; box-shadow: 0 8px 40px rgba(0,0,0,.6); }
  </style>
</head>
<body>
  <div class="app">
    <header class="header">
      <div class="logo">
        <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
          <rect width="28" height="28" rx="8" fill="url(#g1)"/>
          <path d="M8 9h5v10H8V9zm7 0h5l-2 4h3l-6 6 1-4h-3l2-6z" fill="#fff" fill-opacity=".95"/>
          <defs><linearGradient id="g1" x1="0" y1="0" x2="28" y2="28"><stop stop-color="#6366f1"/><stop offset="1" stop-color="#8b5cf6"/></linearGradient></defs>
        </svg>
        <div class="logo-text">
          <span class="logo-title">知乎 → Obsidian</span>
          <span class="logo-sub">Markdown 导出工具</span>
        </div>
      </div>
    </header>

    <section class="section">
      <div class="info-card">
        <div class="info-row">
          <span class="info-label">文章</span>
          <span class="info-value">深入理解 JavaScript 闭包与作用域链</span>
        </div>
        <div class="info-row">
          <span class="info-label">专栏</span>
          <span class="info-value">前端工程</span>
        </div>
      </div>

      <div class="option-group">
        <div class="option-label">导出范围</div>
        <label class="radio-card"><input type="radio" name="scope" value="single"><span class="radio-mark"></span><span class="radio-text">仅当前文章</span></label>
        <label class="radio-card"><input type="radio" name="scope" value="column" checked><span class="radio-mark"></span><span class="radio-text">整个专栏<span class="badge">共 42 篇</span></span></label>
        <label class="radio-card"><input type="radio" name="scope" value="range"><span class="radio-mark"></span><span class="radio-text">自定义范围</span></label>
      </div>

      <div class="option-group">
        <div class="option-label">图片处理</div>
        <div class="image-options">
          <label class="radio-pill"><input type="radio" name="imageMode" value="local" checked><span class="pill-text">📥 下载到本地</span></label>
          <label class="radio-pill"><input type="radio" name="imageMode" value="remote"><span class="pill-text">🔗 保留链接</span></label>
          <label class="radio-pill"><input type="radio" name="imageMode" value="tailscale"><span class="pill-text">🌐 Tailscale</span></label>
        </div>
      </div>

      <button class="btn-export"><span class="btn-icon">⬇</span><span class="btn-text">开始导出</span></button>
    </section>
  </div>
</body>
</html>
